<form name="PermissionForm" bh-submit="RolesPermissionsCtrl.submit(PermissionForm)" novalidate>
  <div class="modal-header">
    <ol class="headercrumb">
      <li class="static" translate>USERS.PERMISSIONS</li>
      <li class="title">{{RolesPermissionsCtrl.role.label}}</li>
    </ol>
  </div>

  <div class="modal-body" style="max-height: 75vh; overflow:auto;">
    <div class="row">
      <div class="col-md-6 col-xs-12">
        <div class="form-group">
          <label class="form-label" translate>USERS.ASSIGNED_PERMISSIONS</label>
          <p class="form-control-static" translate>USERS.ASSIGNED_PERMISSIONS_DESCRIPTION</p>
        </div>

        <bh-checkbox-tree
          data="RolesPermissionsCtrl.units"
          checked-ids="RolesPermissionsCtrl.assignedUnits"
          label-key="key"
          on-change="RolesPermissionsCtrl.onChangePermissions(data)">
        </bh-checkbox-tree>
      </div>

      <div class="col-md-6 col-xs-12">
        <div class="form-group">
          <label class="form-label" translate>USERS.ASSIGNED_ACTIONS</label>
          <p class="form-control-static" translate>USERS.ASSIGNED_ACTIONS_DESCRIPTION</p>
        </div>
        <bh-checkbox-tree
          data="RolesPermissionsCtrl.actions"
          checked-ids="RolesPermissionsCtrl.assignedActions"
          label-key="description"
          on-change="RolesPermissionsCtrl.onChangeSelection(data)"
          is-flat-tree>
        </bh-checkbox-tree>
      </div>
    </div>
  </div>

  <div class="modal-footer">
    <button type="button" class="btn btn-default" ng-click="RolesPermissionsCtrl.close()" translate>
      FORM.BUTTONS.CANCEL
    </button>

    <bh-loading-button loading-state="PermissionForm.$loading">
      <span translate>FORM.BUTTONS.SAVE</span>
    </bh-loading-button>
  </div>
</form>
